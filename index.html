<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚛️ 量子・宇宙株 監視</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .toggle-thumb { transition: transform 0.2s; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ──────────────── Constants ──────────────── */
const ALERT_LEVELS = [
  { drop: 25, ratio: 20, label: '-25%', colorClass: 'text-yellow-400', bgClass: 'bg-yellow-900/60 border-yellow-600' },
  { drop: 40, ratio: 25, label: '-40%', colorClass: 'text-orange-400', bgClass: 'bg-orange-900/60 border-orange-600' },
  { drop: 60, ratio: 25, label: '-60%', colorClass: 'text-red-400',    bgClass: 'bg-red-900/60 border-red-600' },
  { drop: 75, ratio: 30, label: '-75%', colorClass: 'text-red-300',    bgClass: 'bg-red-950/80 border-red-800' },
];
const TARGET_CORE = 70;
const STORAGE_KEY = 'qspace_v2';

/* ──────────────── Storage ──────────────── */
const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { stocks: [], priceData: {} };
  } catch { return { stocks: [], priceData: {} }; }
};
const saveData = (d) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
};
const genId = () => Math.random().toString(36).slice(2, 11);

/* ──────────────── Sparkline Chart ──────────────── */
function SparklineChart({ closes, high3m, currentPrice, currency }) {
  if (!closes || closes.length < 2) return (
    <div className="flex items-center justify-center h-24 text-gray-600 text-xs">データなし</div>
  );

  const W = 600, H = 120, PAD = { t: 10, b: 28, l: 48, r: 16 };
  const innerW = W - PAD.l - PAD.r;
  const innerH = H - PAD.t - PAD.b;

  const minP = Math.min(...closes);
  const maxP = Math.max(...closes);
  const range = maxP - minP || 1;

  const toX = (i) => PAD.l + (i / (closes.length - 1)) * innerW;
  const toY = (v) => PAD.t + innerH - ((v - minP) / range) * innerH;

  const pts = closes.map((c, i) => `${toX(i).toFixed(1)},${toY(c).toFixed(1)}`).join(' ');

  // Alert level lines within visible range
  const alertLines = ALERT_LEVELS.map(l => ({
    ...l, price: high3m * (1 - l.drop / 100)
  })).filter(l => l.price >= minP && l.price <= maxP);

  const sym = currency === 'JPY' ? '¥' : '$';
  const fmt = (v) => v >= 1000 ? `${sym}${(v/1000).toFixed(1)}k` : `${sym}${v.toFixed(v < 10 ? 2 : 1)}`;

  // Line color based on drop from high
  const dp = currentPrice && high3m ? (currentPrice - high3m) / high3m * 100 : 0;
  const lineColor = dp <= -60 ? '#EF4444' : dp <= -40 ? '#F97316' : dp <= -25 ? '#EAB308' : '#22C55E';

  return (
    <div className="w-full">
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height: '120px'}}>
        {/* Grid lines */}
        {[0, 0.25, 0.5, 0.75, 1].map(t => {
          const y = PAD.t + innerH * (1 - t);
          const v = minP + range * t;
          return (
            <g key={t}>
              <line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke="#374151" strokeWidth="0.5" />
              <text x={PAD.l - 4} y={y + 4} textAnchor="end" fontSize="9" fill="#6B7280">{fmt(v)}</text>
            </g>
          );
        })}

        {/* Alert level horizontal lines */}
        {alertLines.map(l => {
          const y = toY(l.price);
          return (
            <g key={l.drop}>
              <line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke={l.colorClass.includes('yellow') ? '#EAB308' : l.colorClass.includes('orange') ? '#F97316' : '#EF4444'} strokeWidth="0.8" strokeDasharray="4,3" opacity="0.6" />
              <text x={W - PAD.r + 2} y={y + 3} fontSize="8" fill="#9CA3AF">-{l.drop}%</text>
            </g>
          );
        })}

        {/* Current price line */}
        {currentPrice >= minP && currentPrice <= maxP && (
          <line x1={PAD.l} y1={toY(currentPrice)} x2={W - PAD.r} y2={toY(currentPrice)}
            stroke={lineColor} strokeWidth="0.8" strokeDasharray="2,2" opacity="0.8" />
        )}

        {/* Price line */}
        <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />

        {/* Last point dot */}
        <circle cx={toX(closes.length - 1)} cy={toY(closes[closes.length - 1])}
          r="3" fill={lineColor} stroke="#111827" strokeWidth="1.5" />

        {/* X-axis labels (start / mid / end) */}
        {[0, Math.floor(closes.length / 2), closes.length - 1].map((i, idx) => (
          <text key={idx} x={toX(i)} y={H - 6} textAnchor="middle" fontSize="9" fill="#6B7280">
            {idx === 0 ? '3ヶ月前' : idx === 1 ? '1.5ヶ月前' : '現在'}
          </text>
        ))}
      </svg>

      {/* TradingView link */}
    </div>
  );
}

/* ──────────────── Mock data (demo mode) ──────────────── */
const mockSeed = (ticker) => {
  let h = 0;
  for (let i = 0; i < ticker.length; i++) h = (Math.imul(31, h) + ticker.charCodeAt(i)) | 0;
  return Math.abs(h);
};
const genMockPrice = (ticker) => {
  const seed = mockSeed(ticker);
  const rng = (min, max) => min + (seed % 1000) / 1000 * (max - min);
  const high3m = parseFloat(rng(8, 80).toFixed(2));
  const dropFactor = 0.55 + (seed % 100) / 100 * 0.40;
  const currentPrice = parseFloat((high3m * dropFactor).toFixed(2));
  return { currentPrice, high3m, currency: 'USD', demo: true, error: null, lastUpdated: new Date().toISOString() };
};

/* ──────────────── Stock price fetch ──────────────── */
const fetchPrice = async (ticker) => {
  const symbol = ticker.toUpperCase().trim();

  // 1st: Vercel serverless proxy (same-origin, no CORS) — works on qspace-deploy.vercel.app
  try {
    const ctl = new AbortController();
    const tid = setTimeout(() => ctl.abort(), 8000);
    const res = await fetch(`/api/price?ticker=${symbol}`, { signal: ctl.signal });
    clearTimeout(tid);
    if (res.ok) {
      const d = await res.json();
      if (d.currentPrice && d.high3m) {
        return { currentPrice: d.currentPrice, high3m: d.high3m, currency: d.currency || 'USD', closes: d.closes || [], demo: false, error: null, lastUpdated: new Date().toISOString() };
      }
    }
  } catch {}

  // 2nd: corsproxy.io
  try {
    const base = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`;
    const ctl = new AbortController();
    const tid = setTimeout(() => ctl.abort(), 8000);
    const res = await fetch(`https://corsproxy.io/?${base}`, { signal: ctl.signal, headers: { 'x-requested-with': 'XMLHttpRequest' } });
    clearTimeout(tid);
    if (res.ok) {
      const json = await res.json();
      const result = json?.chart?.result?.[0];
      const meta = result?.meta;
      const highs = (result?.indicators?.quote?.[0]?.high || []).filter(h => h != null && h > 0);
      if (highs.length && meta?.regularMarketPrice) {
        return { currentPrice: meta.regularMarketPrice, high3m: Math.max(...highs), currency: meta.currency || 'USD', demo: false, error: null, lastUpdated: new Date().toISOString() };
      }
    }
  } catch {}

  // 3rd: allorigins
  try {
    const base = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`;
    const ctl = new AbortController();
    const tid = setTimeout(() => ctl.abort(), 8000);
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(base)}`, { signal: ctl.signal });
    clearTimeout(tid);
    if (res.ok) {
      const wrapper = await res.json();
      const json = JSON.parse(wrapper.contents);
      const result = json?.chart?.result?.[0];
      const meta = result?.meta;
      const highs = (result?.indicators?.quote?.[0]?.high || []).filter(h => h != null && h > 0);
      if (highs.length && meta?.regularMarketPrice) {
        return { currentPrice: meta.regularMarketPrice, high3m: Math.max(...highs), currency: meta.currency || 'USD', demo: false, error: null, lastUpdated: new Date().toISOString() };
      }
    }
  } catch {}

  // All failed → demo mode
  return { ...genMockPrice(symbol), error: 'デモモード（株価取得不可）' };
};

/* ──────────────── Helpers ──────────────── */
const dropPct = (cur, high) => (cur && high) ? ((cur - high) / high * 100) : null;
const fmtPrice = (p, cur) => {
  if (p == null) return '-';
  const sym = cur === 'JPY' ? '¥' : '$';
  return sym + (p < 10 ? p.toFixed(3) : p < 1000 ? p.toFixed(2) : p.toFixed(0));
};
const calcAvgCost = (purchases) => {
  if (!purchases?.length) return null;
  const totalVal = purchases.reduce((s, p) => s + p.price * p.shares, 0);
  const totalShr = purchases.reduce((s, p) => s + p.shares, 0);
  return totalShr > 0 ? totalVal / totalShr : null;
};
const calcStatus = (stock) => {
  if (Object.values(stock.dangerSignals || {}).some(v => v)) return 'danger';
  const f = stock.financials || {};
  const runway = f.cash > 0 && f.annualLoss > 0 ? f.cash / f.annualLoss : null;
  const step2 = runway >= 2;
  if (step2 && f.revenueGrowing && f.hasContracts && f.noExcessiveIssuance) return 'good';
  return 'warning';
};

/* ══════════════════════════════════════════
   App
══════════════════════════════════════════ */
function App() {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('watchlist');
  const [loading, setLoading] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const { stocks, priceData } = data;

  const update = useCallback((fn) => {
    setData(prev => { const next = fn(prev); saveData(next); return next; });
  }, []);

  const refreshPrices = useCallback(async (tickers) => {
    const list = tickers ?? stocks.map(s => s.ticker);
    if (!list.length) return;
    setLoading(p => ({ ...p, ...Object.fromEntries(list.map(t => [t, true])) }));
    await Promise.all(list.map(async (ticker) => {
      const pd = await fetchPrice(ticker);
      update(prev => ({ ...prev, priceData: { ...prev.priceData, [ticker]: pd } }));
      setLoading(p => ({ ...p, [ticker]: false }));
    }));
  }, [stocks, update]);

  useEffect(() => { if (stocks.length) refreshPrices(); }, []);

  const addStock = (s) => {
    const stock = {
      id: genId(), ticker: s.ticker.toUpperCase().trim(),
      name: s.name || s.ticker.toUpperCase().trim(),
      type: s.type || 'core',
      financials: { cash: +s.cash || 0, annualLoss: +s.annualLoss || 0, revenueGrowing: false, hasContracts: false, noExcessiveIssuance: false },
      dangerSignals: { insolvency: false, auditConcern: false, excessiveIssuance: false, listingRisk: false },
      purchases: [],
    };
    update(prev => ({ ...prev, stocks: [...prev.stocks, stock] }));
    refreshPrices([stock.ticker]);
    setShowAdd(false);
  };
  const delStock = (id) => {
    if (!confirm('この銘柄を削除しますか？')) return;
    update(prev => ({ ...prev, stocks: prev.stocks.filter(s => s.id !== id) }));
  };
  const updStock = (id, patch) => update(prev => ({
    ...prev, stocks: prev.stocks.map(s => s.id === id ? { ...s, ...patch } : s)
  }));
  const addPurchase = (sid, p) => update(prev => ({
    ...prev, stocks: prev.stocks.map(s =>
      s.id === sid ? { ...s, purchases: [...s.purchases, { ...p, id: genId() }] } : s
    )
  }));
  const delPurchase = (sid, pid) => update(prev => ({
    ...prev, stocks: prev.stocks.map(s =>
      s.id === sid ? { ...s, purchases: s.purchases.filter(p => p.id !== pid) } : s
    )
  }));

  const alerts = stocks.flatMap(s => {
    const pd = priceData[s.ticker];
    const dp = dropPct(pd?.currentPrice, pd?.high3m);
    if (dp == null) return [];
    return ALERT_LEVELS.filter(l => dp <= -l.drop).map(l => ({ stock: s, level: l, dp, pd }));
  });

  return (
    <div className="min-h-screen bg-gray-950 text-gray-100 flex">
      {/* ── Left Sidebar (desktop) ── */}
      <aside className="hidden md:flex flex-col w-56 shrink-0 border-r border-gray-800 bg-gray-900 sticky top-0 h-screen z-20">
        <div className="px-4 py-4 border-b border-gray-800">
          <h1 className="text-sm font-bold text-blue-400 leading-tight">⚛️ 量子・宇宙株 監視</h1>
          <p className="text-xs text-gray-500 mt-0.5">段階的買い増し戦略ツール</p>
        </div>
        <nav className="flex-1 px-3 pt-3 space-y-1">
          {[
            { id: 'watchlist', icon: '📊', label: '監視リスト' },
            { id: 'portfolio', icon: '🥧', label: 'ポートフォリオ' },
            { id: 'records',   icon: '📝', label: '買い増し記録' },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors w-full text-left ${tab === t.id ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-gray-100'}`}>
              <span className="text-base">{t.icon}</span>
              {t.label}
              {t.id === 'watchlist' && alerts.length > 0 && (
                <span className="ml-auto bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold shrink-0">
                  {alerts.length > 9 ? '9+' : alerts.length}
                </span>
              )}
            </button>
          ))}
        </nav>
        {/* Refresh button at bottom of sidebar */}
        <div className="px-3 pb-4">
          <button onClick={() => refreshPrices()}
            className="w-full flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 text-gray-300 py-2.5 rounded-xl text-sm font-medium transition-colors">
            🔄 株価を更新
          </button>
        </div>
      </aside>

      {/* ── Mobile header ── */}
      <div className="md:hidden fixed top-0 left-0 right-0 bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between z-10 h-14">
        <h1 className="text-base font-bold text-blue-400">⚛️ 量子・宇宙株 監視</h1>
        <button onClick={() => refreshPrices()}
          className="bg-gray-800 active:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg text-xs">
          🔄 更新
        </button>
      </div>

      {/* ── Main content ── */}
      <div className="flex-1 min-w-0 flex flex-col">
        <main className="flex-1 pt-14 md:pt-0 pb-20 md:pb-6">
          {tab === 'watchlist' && (
            <WatchList stocks={stocks} priceData={priceData} loading={loading}
              onAdd={() => setShowAdd(true)} onDelete={delStock}
              onUpdate={updStock} onRefresh={refreshPrices}
              alerts={alerts} addPurchase={addPurchase} />
          )}
          {tab === 'portfolio' && <Portfolio stocks={stocks} priceData={priceData} />}
          {tab === 'records' && <Records stocks={stocks} onAdd={addPurchase} onDelete={delPurchase} />}
        </main>
      </div>

      {/* Mobile bottom tab bar */}
      <TabBar tab={tab} setTab={setTab} alertCount={alerts.length} />
      {showAdd && <AddModal onAdd={addStock} onClose={() => setShowAdd(false)} />}
    </div>
  );
}

/* ──────────────── TabBar (mobile only) ──────────────── */
function TabBar({ tab, setTab, alertCount }) {
  const tabs = [
    { id: 'watchlist', icon: '📊', label: '監視リスト' },
    { id: 'portfolio', icon: '🥧', label: 'ポートフォリオ' },
    { id: 'records',   icon: '📝', label: '買い増し記録' },
  ];
  return (
    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 flex z-20">
      {tabs.map(t => (
        <button key={t.id} onClick={() => setTab(t.id)}
          className={`flex-1 py-2.5 flex flex-col items-center gap-0.5 relative transition-colors ${tab === t.id ? 'text-blue-400' : 'text-gray-500'}`}>
          <span className="text-xl">{t.icon}</span>
          <span className="text-xs leading-none">{t.label}</span>
          {t.id === 'watchlist' && alertCount > 0 && (
            <span className="absolute top-1.5 right-6 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center leading-none font-bold">
              {alertCount > 9 ? '9+' : alertCount}
            </span>
          )}
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   WatchList Tab
══════════════════════════════════════════ */
function WatchList({ stocks, priceData, loading, onAdd, onDelete, onUpdate, onRefresh, alerts, addPurchase }) {
  return (
    <div className="p-3 md:p-6 space-y-3">
      {alerts.length > 0 && (
        <div className="bg-yellow-900/40 border border-yellow-700 rounded-xl p-3">
          <p className="text-yellow-400 font-bold text-sm mb-2">🔔 買い増しアラート ({alerts.length}件)</p>
          <div className="space-y-1">
            {alerts.map((a, i) => (
              <div key={i} className="flex justify-between text-xs text-yellow-300">
                <span className="font-semibold">{a.stock.ticker}</span>
                <span>高値比 {a.dp.toFixed(1)}%（-{a.level.drop}%ライン超え）</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <button onClick={onAdd}
        className="w-full bg-blue-600 active:bg-blue-700 text-white py-3 rounded-xl font-semibold text-sm transition-colors">
        ＋ 銘柄を追加
      </button>

      {stocks.length === 0 && (
        <div className="text-center text-gray-600 py-16">
          <p className="text-5xl mb-3">🚀</p>
          <p className="text-sm">銘柄を追加して監視を始めましょう</p>
        </div>
      )}

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
        {stocks.map(s => (
          <StockCard key={s.id} stock={s} priceData={priceData[s.ticker]}
            loading={loading[s.ticker]}
            onDelete={() => onDelete(s.id)}
            onUpdate={(p) => onUpdate(s.id, p)}
            onRefresh={() => onRefresh([s.ticker])}
            onAddPurchase={(p) => addPurchase(s.id, p)} />
        ))}
      </div>
    </div>
  );
}

/* ──────────────── StockCard ──────────────── */
function StockCard({ stock, priceData, loading, onDelete, onUpdate, onRefresh, onAddPurchase }) {
  const [open, setOpen] = useState(false);
  const [buyForm, setBuyForm] = useState(false);
  const [chartRange, setChartRange] = useState('1y');
  const [chartCloses, setChartCloses] = useState(null);
  const [chartLoading, setChartLoading] = useState(false);

  // Fetch chart data when range changes
  useEffect(() => {
    if (!stock.ticker) return;
    let cancelled = false;
    setChartLoading(true);
    fetch(`/api/price?ticker=${stock.ticker}&range=${chartRange}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (!cancelled) setChartCloses(d?.closes || []); })
      .catch(() => { if (!cancelled) setChartCloses([]); })
      .finally(() => { if (!cancelled) setChartLoading(false); });
    return () => { cancelled = true; };
  }, [stock.ticker, chartRange]);

  const hasDanger = Object.values(stock.dangerSignals || {}).some(v => v);
  const status = calcStatus(stock);
  const dp = dropPct(priceData?.currentPrice, priceData?.high3m);
  const avg = calcAvgCost(stock.purchases);
  const f = stock.financials || {};
  const runway = f.cash > 0 && f.annualLoss > 0 ? f.cash / f.annualLoss : null;

  // Border: red for danger, green for good, else subtle
  const borderCls = hasDanger ? 'border-2 border-red-600' : status === 'good' ? 'border-2 border-green-600' : 'border border-gray-700/80';
  const bgCls = hasDanger ? 'bg-red-950/10' : 'bg-gray-900';

  const updF = (k, v) => onUpdate({ financials: { ...f, [k]: v } });
  const togDanger = (k) => onUpdate({ dangerSignals: { ...stock.dangerSignals, [k]: !stock.dangerSignals[k] } });

  return (
    <div className={`rounded-xl ${borderCls} ${bgCls} overflow-hidden`}>

      <div className="p-3">
        {/* Title row */}
        <div className="flex items-center justify-between gap-2 mb-2">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-lg font-bold tracking-wide leading-none">{stock.ticker}</span>
            <span className={`text-xs px-1.5 py-0.5 rounded-full font-medium shrink-0 ${stock.type === 'core' ? 'bg-blue-900 text-blue-300' : 'bg-purple-900 text-purple-300'}`}>
              {stock.type === 'core' ? 'コア' : 'サテライト'}
            </span>
            {stock.name !== stock.ticker && (
              <span className="text-xs text-gray-500 truncate hidden sm:block">{stock.name}</span>
            )}
          </div>
          <div className="flex gap-2 shrink-0">
            <button onClick={onRefresh} disabled={loading} className="text-gray-500 active:text-gray-300 text-sm">{loading ? '⏳' : '🔄'}</button>
            <button onClick={onDelete} className="text-gray-600 active:text-red-400 text-sm">🗑️</button>
          </div>
        </div>

        {/* Price row — 横並びでコンパクトに */}
        <div className="flex items-end justify-between gap-2 mb-2">
          <div>
            <p className="text-xs text-gray-500 leading-none mb-0.5">現在値{priceData?.demo ? ' (仮)' : ''}</p>
            <p className={`text-2xl font-bold leading-none ${priceData?.demo ? 'text-gray-400' : 'text-white'}`}>
              {priceData?.currentPrice ? fmtPrice(priceData.currentPrice, priceData.currency) : '—'}
            </p>
            {priceData?.lastUpdated && !priceData?.demo && (
              <p className="text-xs text-gray-600 mt-0.5">{new Date(priceData.lastUpdated).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</p>
            )}
          </div>
          <div className="text-right">
            <p className="text-xs text-gray-500 leading-none mb-0.5">3ヶ月高値比</p>
            <p className={`text-xl font-bold leading-none ${
              dp == null ? 'text-gray-500' :
              dp <= -60 ? 'text-red-400' : dp <= -40 ? 'text-orange-400' :
              dp <= -25 ? 'text-yellow-400' : 'text-green-400'
            }`}>{dp != null ? `${dp.toFixed(1)}%` : '—'}</p>
            {priceData?.high3m && <p className="text-xs text-gray-600 mt-0.5">高値 {fmtPrice(priceData.high3m, priceData.currency)}</p>}

          <p className="text-xs text-red-400 mb-2">⚠️ {priceData.error}</p>
        )}

          <div className="mb-2">
            <p className="text-xs text-gray-600 mb-1">買い増しライン</p>
            <div className="flex gap-1">
              {ALERT_LEVELS.map(level => {
                const target = priceData.high3m * (1 - level.drop / 100);
                const reached = dp != null && dp <= -level.drop;
                return (
                  <div key={level.drop} className={`flex-1 rounded-lg py-1.5 px-1 text-center border transition-colors ${
                    reached ? level.bgClass : 'bg-gray-800/50 border-gray-700/50'

                    <p className={`text-xs font-bold leading-none ${reached ? level.colorClass : 'text-gray-500'}`}>{level.label}</p>

                    <p className={`text-xs leading-none mt-0.5 ${reached ? 'text-gray-300' : 'text-gray-600'}`}>{level.ratio}%</p>

/* ──────────────── PurchaseForm ──────────────── */
function PurchaseForm({ onAdd, onCancel, currentPrice, high3m, currency }) {
  const [form, setForm] = useState({
    date: new Date().toISOString().slice(0, 10),
    price: currentPrice?.toFixed(currentPrice < 10 ? 3 : 2) || '',
    shares: '',
    note: '',
  });
  const dp = form.price && high3m ? ((parseFloat(form.price) - high3m) / high3m * 100).toFixed(1) : null;
  const total = form.price && form.shares ? (parseFloat(form.price) * parseFloat(form.shares)).toFixed(2) : null;

  return (
    <div className="bg-gray-800/80 rounded-xl p-3 space-y-2.5 border border-gray-700">
      <p className="text-sm font-bold text-gray-200">買い増し記録</p>
      <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})}
        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm" />
      <div className="flex gap-2">
        <input type="number" value={form.price} placeholder="購入価格"
          onChange={e => setForm({...form, price: e.target.value})}
          className="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm" />
        <input type="number" value={form.shares} placeholder="株数"
          onChange={e => setForm({...form, shares: e.target.value})}
          className="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm" />
      </div>
      {(dp || total) && (
        <div className="flex gap-3 text-xs text-gray-400">
          {dp && <span>高値比: <strong className="text-yellow-400">{dp}%</strong></span>}
          {total && <span>合計: <strong className="text-gray-200">{currency === 'JPY' ? '¥' : '$'}{total}</strong></span>}
        </div>
      )}
      <input type="text" value={form.note} placeholder="メモ（任意）"
        onChange={e => setForm({...form, note: e.target.value})}
        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm" />
      <div className="flex gap-2">
        <button onClick={onCancel} className="flex-1 bg-gray-600 py-2.5 rounded-lg text-sm">キャンセル</button>
        <button
          disabled={!form.price || !form.shares}
          onClick={() => onAdd({ date: form.date, price: parseFloat(form.price), shares: parseFloat(form.shares), dropRate: dp ? parseFloat(dp) : null, note: form.note })}
          className="flex-1 bg-blue-600 active:bg-blue-700 disabled:opacity-40 py-2.5 rounded-lg text-sm font-semibold">
          記録する
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   Portfolio Tab
══════════════════════════════════════════ */
function Portfolio({ stocks, priceData }) {
  // 買い増し記録がある銘柄のみ対象
  const heldStocks = stocks.filter(s => s.purchases?.length > 0);
  const cores = heldStocks.filter(s => s.type === 'core');
  const sats  = heldStocks.filter(s => s.type === 'satellite');
  const n = heldStocks.length;

  // 保有金額ベースで比率計算
  const calcValue = (s) => {
    const avg = calcAvgCost(s.purchases);
    const shares = s.purchases.reduce((a, p) => a + p.shares, 0);
    const cur = priceData[s.ticker]?.currentPrice;
    return cur ? cur * shares : avg * shares;
  };
  const coreVal = cores.reduce((a, s) => a + calcValue(s), 0);
  const satVal  = sats.reduce((a, s) => a + calcValue(s), 0);
  const totalVal = coreVal + satVal;
  const coreRatio = totalVal ? coreVal / totalVal * 100 : 0;
  const satRatio  = totalVal ? satVal  / totalVal * 100 : 0;
  const dev = Math.abs(coreRatio - TARGET_CORE);

  return (
    <div className="p-4 md:p-6 space-y-4 max-w-4xl">
      <h2 className="text-xl font-bold">ポートフォリオ</h2>

      {n === 0 ? (
        <div className="text-center text-gray-600 py-16">
          <p className="text-5xl mb-3">🥧</p>
          <p className="text-sm font-medium text-gray-500">まだ買い増し記録がありません</p>
          <p className="text-xs text-gray-600 mt-1">「監視リスト」の銘柄カードから購入を記録すると表示されます</p>
        </div>
      ) : (
        <>
          {/* Donut */}
          <div className="bg-gray-900 rounded-2xl p-4">
            <p className="text-sm text-gray-400 mb-3">コア / サテライト比率（保有金額ベース）</p>
            <DonutChart coreRatio={coreRatio} satRatio={satRatio} />
            <div className="flex justify-center gap-8 mt-4">
              <div className="text-center">
                <div className="flex items-center gap-1.5 justify-center mb-1">
                  <span className="w-3 h-3 rounded-full bg-blue-500 inline-block" />
                  <span className="text-sm text-gray-300">コア</span>
                </div>
                <p className="text-2xl font-bold text-blue-400">{coreRatio.toFixed(0)}%</p>
                <p className="text-xs text-gray-500">{cores.length} 銘柄 · ${coreVal.toFixed(0)}</p>
              </div>
              <div className="text-center">
                <div className="flex items-center gap-1.5 justify-center mb-1">
                  <span className="w-3 h-3 rounded-full bg-purple-500 inline-block" />
                  <span className="text-sm text-gray-300">サテライト</span>
                </div>
                <p className="text-2xl font-bold text-purple-400">{satRatio.toFixed(0)}%</p>
                <p className="text-xs text-gray-500">{sats.length} 銘柄 · ${satVal.toFixed(0)}</p>
              </div>
            </div>
            <p className="text-center text-xs text-gray-600 mt-3">合計評価額 ${totalVal.toFixed(0)}</p>
          </div>

          {/* Deviation */}
          <div className={`rounded-xl p-3 border ${dev > 10 ? 'bg-yellow-900/30 border-yellow-700' : 'bg-green-900/20 border-green-800'}`}>
            <p className={`font-semibold text-sm ${dev > 10 ? 'text-yellow-400' : 'text-green-400'}`}>
              {dev > 10 ? '⚠️ 目標比率からの乖離あり' : '✅ 目標比率内'}
            </p>
            <p className="text-xs text-gray-400 mt-1">
              目標: コア {TARGET_CORE}% / サテライト {100 - TARGET_CORE}%　→　乖離 {dev.toFixed(0)}pt
            </p>
          </div>

          {/* Stock rows */}
          {[{ label: 'コア銘柄', list: cores, color: 'text-blue-400' },
            { label: 'サテライト銘柄', list: sats, color: 'text-purple-400' }].map(({ label, list, color }) => (
            list.length > 0 && (
              <div key={label}>
                <p className={`text-sm font-bold ${color} mb-2`}>{label}</p>
                {list.map(s => <PortfolioRow key={s.id} stock={s} priceData={priceData[s.ticker]} />)}
              </div>
            )
          ))}
        </>
      )}
    </div>
  );
}

function PortfolioRow({ stock, priceData }) {
  const avg = calcAvgCost(stock.purchases);
  const totalShares = stock.purchases?.reduce((s, p) => s + p.shares, 0) || 0;
  const curVal  = totalShares && priceData?.currentPrice ? totalShares * priceData.currentPrice : null;
  const costVal = totalShares && avg ? totalShares * avg : null;
  const pnl     = curVal && costVal ? curVal - costVal : null;
  const pnlPct  = pnl != null && costVal ? pnl / costVal * 100 : null;
  const status  = calcStatus(stock);

  return (
    <div className={`bg-gray-800/60 rounded-xl px-3 py-2.5 mb-1.5 flex items-center justify-between border ${
      status === 'danger' ? 'border-red-800' : status === 'good' ? 'border-green-900' : 'border-yellow-900'
    }`}>
      <div>
        <p className="font-bold text-sm">{stock.ticker}</p>
        {totalShares > 0 && <p className="text-xs text-gray-500">{totalShares} 株 • 平均 {fmtPrice(avg, priceData?.currency)}</p>}
      </div>
      <div className="text-right">
        {priceData?.currentPrice && <p className="text-sm font-semibold">{fmtPrice(priceData.currentPrice, priceData.currency)}</p>}
        {pnlPct != null && (
          <p className={`text-xs font-bold ${pnlPct >= 0 ? 'text-green-400' : 'text-red-400'}`}>
            {pnlPct >= 0 ? '+' : ''}{pnlPct.toFixed(1)}%
          </p>
        )}
      </div>
    </div>
  );
}

/* ──────────────── SVG Donut ──────────────── */
function DonutChart({ coreRatio, satRatio }) {
  const r = 58, cx = 80, cy = 80, sw = 22;
  const circ = 2 * Math.PI * r;
  const coreDash = coreRatio / 100 * circ;
  const satDash  = satRatio  / 100 * circ;
  return (
    <svg viewBox="0 0 160 160" className="w-36 h-36 mx-auto" style={{transform:'rotate(-90deg)'}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1F2937" strokeWidth={sw} />
      {satDash > 0 && (
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#7C3AED" strokeWidth={sw}
          strokeDasharray={`${satDash} ${circ}`} strokeDashoffset={-coreDash} strokeLinecap="round" />
      )}
      {coreDash > 0 && (
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#3B82F6" strokeWidth={sw}
          strokeDasharray={`${coreDash} ${circ}`} strokeDashoffset={0} strokeLinecap="round" />
      )}
    </svg>
  );
}

/* ══════════════════════════════════════════
   Records Tab
══════════════════════════════════════════ */
function Records({ stocks, onAdd, onDelete }) {
  const [filter, setFilter] = useState('all');
  const [selId, setSelId] = useState('');
  const [showForm, setShowForm] = useState(false);

  const targeted = filter === 'all' ? stocks : stocks.filter(s => s.id === filter);

  return (
    <div className="p-4 md:p-6 space-y-4 max-w-4xl">
      <h2 className="text-xl font-bold">買い増し記録</h2>

      {/* Filter pills */}
      <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
        <button onClick={() => setFilter('all')}
          className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shrink-0 ${filter === 'all' ? 'bg-blue-700 text-white' : 'bg-gray-800 text-gray-400'}`}>
          すべて
        </button>
        {stocks.map(s => (
          <button key={s.id} onClick={() => setFilter(s.id)}
            className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shrink-0 ${filter === s.id ? 'bg-blue-700 text-white' : 'bg-gray-800 text-gray-400'}`}>
            {s.ticker}
          </button>
        ))}
      </div>

      {/* Quick add */}
      {stocks.length > 0 && (
        <div>
          <select value={selId}
            onChange={e => { setSelId(e.target.value); setShowForm(!!e.target.value); }}
            className="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2.5 text-sm focus:outline-none">
            <option value="">＋ 銘柄を選んで記録する…</option>
            {stocks.map(s => <option key={s.id} value={s.id}>{s.ticker} — {s.name}</option>)}
          </select>
          {showForm && selId && (
            <div className="mt-2">
              <PurchaseForm
                onAdd={(p) => { onAdd(selId, p); setShowForm(false); setSelId(''); }}
                onCancel={() => { setShowForm(false); setSelId(''); }} />
            </div>
          )}
        </div>
      )}

      {/* Stock sections */}
      {targeted.map(s => {
        const ps = s.purchases || [];
        if (!ps.length) return null;
        const totalShr = ps.reduce((a, p) => a + p.shares, 0);
        const avg = calcAvgCost(ps);
        const sorted = [...ps].sort((a, b) => new Date(b.date) - new Date(a.date));
        return (
          <div key={s.id} className="bg-gray-900 rounded-2xl p-4">
            <div className="flex justify-between items-center mb-3">
              <div>
                <p className="font-bold text-lg">{s.ticker}</p>
                <p className="text-xs text-gray-500">{totalShr} 株保有</p>
              </div>
              <div className="text-right">
                <p className="text-xs text-gray-500">平均取得単価</p>
                <p className="text-lg font-bold text-blue-400">{fmtPrice(avg, 'USD')}</p>
              </div>
            </div>
            <div className="space-y-1.5">
              {sorted.map(p => (
                <div key={p.id} className="bg-gray-800/60 rounded-xl px-3 py-2.5 flex items-center gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-500">{p.date}</span>
                      {p.dropRate != null && (
                        <span className="text-xs text-yellow-500 font-medium">高値比 {p.dropRate}%</span>
                      )}
                    </div>
                    <p className="text-sm font-semibold">
                      ${p.price.toFixed(p.price < 10 ? 3 : 2)} × {p.shares} 株
                      <span className="text-xs text-gray-500 ml-2">= ${(p.price * p.shares).toFixed(2)}</span>
                    </p>
                    {p.note && <p className="text-xs text-gray-500 mt-0.5 truncate">{p.note}</p>}
                  </div>
                  <button onClick={() => { if(confirm('削除しますか？')) onDelete(s.id, p.id); }}
                    className="text-gray-600 active:text-red-400 shrink-0 text-sm">🗑️</button>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {targeted.every(s => !s.purchases?.length) && (
        <div className="text-center text-gray-600 py-16">
          <p className="text-5xl mb-3">📝</p>
          <p className="text-sm">記録がありません</p>
        </div>
      )}
    </div>
  );
}

/* ──────────────── Mount ──────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
